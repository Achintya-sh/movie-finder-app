<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Movie Finder - Discover Your Next Favorite</title>
    <link rel="stylesheet" href="css/styles.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
</head>
<body>

    <nav class="navbar">
        <div class="nav-inner">
            <div class="nav-left">
                <h1 class="logo">MOVIEFINDER</h1>
                <div class="nav-links">
                    <a href="#" class="nav-link active">Home</a>
                    <a href="#" class="nav-link">My List</a>
                </div>
            </div>
            <div class="nav-right">
                <div class="profile-icon">A</div>
            </div>
        </div>
    </nav>

    <section class="search-section">
        <div class="page-wrap">
            <div class="yts-search-row">
                <label class="yts-search-label">Search Term:</label>
                <div class="yts-search-bar-wrap">
                    <input type="text" id="searchInput" placeholder="" class="yts-search-bar">
                    <button class="yts-search-btn" id="searchBtn">Search</button>
                </div>
            </div>
            <div class="yts-filters-row">
                <div class="yts-filter-group">
                    <label>Quality:</label>
                    <select id="typeFilter" class="yts-select">
                        <option value="all">All</option>
                        <option value="movie">Movies</option>
                        <option value="series">TV Series</option>
                    </select>
                </div>
                <div class="yts-filter-group">
                    <label>Year:</label>
                    <input type="number" id="yearFilter" placeholder="All" class="yts-select yts-year-input">
                </div>
                <div class="yts-filter-group">
                    <label>Order By:</label>
                    <select id="orderBy" class="yts-select">
                        <option value="latest">Latest</option>
                        <option value="az">A–Z</option>
                        <option value="za">Z–A</option>
                        <option value="year-new">Year ↓</option>
                        <option value="year-old">Year ↑</option>
                    </select>
                </div>
            </div>
        </div>
    </section>

    <div id="loading" class="loading-container hidden">
        <div class="loading-spinner"></div>
        <p class="loading-text">Loading movies...</p>
    </div>

    <section class="browse-section">
        <div class="page-wrap">
            <div id="paginationTop" class="yts-pagination"></div>
            <div id="movieGrid" class="yts-movie-grid"></div>
            <div id="noResults" class="no-results hidden">
                <svg width="80" height="80" fill="currentColor" viewBox="0 0 20 20" opacity="0.3">
                    <path fill-rule="evenodd" d="M18 10a8 8 0 11-16 0 8 8 0 0116 0zm-7 4a1 1 0 11-2 0 1 1 0 012 0zm-1-9a1 1 0 00-1 1v4a1 1 0 102 0V6a1 1 0 00-1-1z" clip-rule="evenodd"/>
                </svg>
                <h3>No movies found</h3>
                <p>Try adjusting your search or filters</p>
            </div>
            <div id="paginationBottom" class="yts-pagination"></div>
        </div>
    </section>

    <footer class="footer">
        <div class="page-wrap footer-content">
            <p>© 2026 MovieFinder. Made with ❤️ by Achintya Sharma</p>
            <div class="footer-links">
                <a href="#">About</a>
                <a href="#">API</a>
                <a href="#">GitHub</a>
            </div>
        </div>
    </footer>

    <script src="js/config.js"></script>
    <script src="js/api.js"></script>
    <script src="js/utils.js"></script>
    <script src="js/app.js"></script>
</body>
</html>
